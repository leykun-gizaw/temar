<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c5d9b8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d5e3cc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lampGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fff7e0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fff7e0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" rx="48" fill="#d5e3cc"/>
  <rect width="600" height="600" rx="48" fill="url(#bgGrad)"/>

  <!-- === DESK === -->
  <rect x="80" y="360" width="440" height="14" rx="4" fill="#c8a87c"/>
  <!-- Legs -->
  <rect x="100" y="374" width="10" height="140" rx="3" fill="#b89868"/>
  <rect x="490" y="374" width="10" height="140" rx="3" fill="#b89868"/>

  <!-- === STACKED BOOKS (left side of desk) === -->
  <rect x="140" y="328" width="110" height="14" rx="3" fill="#7a9a6a"/>
  <rect x="148" y="316" width="96" height="12" rx="3" fill="#e8dcc8"/>
  <rect x="154" y="304" width="82" height="12" rx="3" fill="#c49060"/>

  <!-- === LAMP (right side) === -->
  <!-- Base -->
  <ellipse cx="420" cy="360" rx="24" ry="5" fill="#4a4a48"/>
  <!-- Pole -->
  <rect x="417" y="290" width="6" height="70" rx="2" fill="#4a4a48"/>
  <!-- Arm -->
  <line x1="420" y1="294" x2="388" y2="264" stroke="#4a4a48" stroke-width="4" stroke-linecap="round"/>
  <!-- Shade -->
  <path d="M370 264 L380 240 L404 240 L398 264 Z" fill="#4a4a48"/>
  <!-- Glow -->
  <ellipse cx="384" cy="290" rx="32" ry="40" fill="url(#lampGlow)" opacity="0.35"/>

  <!-- === SMALL PLANT (far right on desk) === -->
  <path d="M500 360 L496 342 L512 342 L508 360 Z" fill="#c4856c"/>
  <ellipse cx="504" cy="334" rx="10" ry="12" fill="#6a9a5a"/>
  <ellipse cx="498" cy="330" rx="7" ry="9" fill="#7aaa68" transform="rotate(-10, 498, 330)"/>
  <ellipse cx="510" cy="330" rx="7" ry="9" fill="#7aaa68" transform="rotate(10, 510, 330)"/>
</svg>
